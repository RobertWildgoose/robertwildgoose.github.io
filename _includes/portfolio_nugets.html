<!-- Portfolio Grid Section -->
<section class="success" id="portfolio_nugets">
  <div class="container">
    <div class="row">
      <div class="col-lg-12 text-center">
        <h2>Nuget Packages</h2>
        <hr class="star-light">
      </div>
    </div>
    <div class="row">
      {% for post in site.nugets %}
      <div class="col-sm-12 col-md-6 col-lg-3">
        <a href="{{ post.link }}" class="portfolio-link" data-toggle="modal">
          <img src="img/portfolio/{{ post.img }}" class="img-responsive" alt="{{ post.alt }}">
        </a>
      </div>
      {% endfor %}
    </div>
    </div>
  </div>
</section>
<section id="portfolio_projects">
  <div class="container">
    <div class="row" style="margin-top:20px;">
      <div class="col-lg-12 text-center">
        <h2>Projects</h2>
        <hr class="star-primary">
      </div>
    </div>
    <div class="row">
      {% for post in site.projects %}
      <div class="col-sm-12 col-md-6 col-lg-3">
        {% if post.downloadlink != "blank" %}
        <a download href="{{ post.downloadlink }}" class="portfolio-link" data-toggle="modal">
          <img src="img/portfolio/{{ post.img }}" class="img-responsive" alt="{{ post.alt }}">
        </a>
        {% elsif post.link != "" %}
        <a href="{{ post.link }}" class="portfolio-link" data-toggle="modal">
          <img src="img/portfolio/{{ post.img }}" class="img-responsive" alt="{{ post.alt }}">
        </a>
        {% endif %}
      </div>
      {% endfor %}
    </div>
  </div>
</section>
