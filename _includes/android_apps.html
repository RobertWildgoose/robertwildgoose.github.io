<!-- Portfolio Grid Section -->
<section id="android_apps">
  <div class="container">
    <div class="row">
      <div class="col-lg-12 text-center">
        <h2>Android Mobile Apps</h2>
        <hr class="star-primary">
      </div>
    </div>
    <div class="row justify-content-center">
      {% for post in site.androidapps %}

      <div class="col-sm-12 col-md-6 col-lg-3">
        <a href="{{ post.link }}" class="portfolio-link" data-toggle="modal">
          <img src="img/portfolio/android_apps/{{ post.img }}" class="img-responsive" alt="{{ post.alt }}">
        </a>
      </div>
      {% endfor %}
    </div>
    </div>
  </div>
</section>
