<h1 class="page-title">Projects</h1>
{% for post in site.posts %}
<div class="{{post.type}} content-element-item">
	<a href="{{ post.url }}">
		<div class="content-element-item-image-container">
			<img class="content-element-item-image" src="{{post.image}}">
		</div>
		<div class="content-element-item-text-container">
			<h3>{{ post.title }}</h3>
			<h5>{{ post.subtitle }}</h5>
			<h6>{{post.date | date: "%d %b %Y"}}</h6>
		</div>
	</a>
</div>
{% endfor %}
{% include footer.html %}
